[build-system]
requires = [
    "pybind11>=2.12",
    "setuptools>=64",
    "wheel",
]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["mars"]

[project]
name = "mars"
version = "0.3"
description = "Multivariate Adaptive Regression Splines"
readme = "README.md"
authors = [
    { name = "Arnaldo Leon", email = "amleon@alum.mit.edu" },
]
requires-python = ">=3.10"
license = "MIT"

[project.urls]
Source = "https://github.com/aleon1138/mars"
